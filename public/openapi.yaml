  # ══════════════════════════════════════════════════════════
  # PROFILE  (Authenticated)
  # ══════════════════════════════════════════════════════════

  /api/profile:
    get:
      tags: [Profile]
      summary: Get current user profile with addresses
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
                          addresses:
                            type: array
                            items: { $ref: '#/components/schemas/Address' }
        "401": { $ref: '#/components/responses/Unauthorized' }

    put:
      tags: [Profile]
      summary: Update current user's profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone:     { type: string }
                password:  { type: string }
      responses:
        "200": { description: Profile updated }

  /api/profile/addresses:
    get:
      tags: [Profile]
      summary: List current user's addresses
      responses:
        "200":
          description: Address list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Address' }

    post:
      tags: [Profile]
      summary: Add a new address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [street, city]
              properties:
                label:      { type: string }
                street:     { type: string }
                city:       { type: string }
                country:    { type: string }
                is_default: { type: boolean }
      responses:
        "201": { description: Address added }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/profile/addresses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    put:
      tags: [Profile]
      summary: Update an address
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:      { type: string }
                street:     { type: string }
                city:       { type: string }
                country:    { type: string }
                is_default: { type: boolean }
      responses:
        "200": { description: Address updated }
        "404": { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Profile]
      summary: Delete an address
      responses:
        "200": { description: Address deleted }
        "404": { $ref: '#/components/responses/NotFound' }
