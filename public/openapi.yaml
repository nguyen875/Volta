        "201": { description: Item added }

  /api/bundles/{id}/items/{itemId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: itemId
        in: path
        required: true
        schema: { type: integer }

    delete:
      tags: [Bundles]
      summary: Remove item from bundle (Admin)
      responses:
        "200": { description: Item removed }

