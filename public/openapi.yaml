  # ══════════════════════════════════════════════════════════
  # CART  (Authenticated Customer)
  # ══════════════════════════════════════════════════════════

  /api/cart:
    get:
      tags: [Cart]
      summary: Get cart contents
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/CartItem' }
                          subtotal: { type: number, format: float }
                          count:    { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }

    delete:
      tags: [Cart]
      summary: Clear entire cart
      responses:
        "200": { description: Cart cleared }

  /api/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                item_type:  { type: string, enum: [product, bundle], default: product }
                product_id: { type: integer }
                bundle_id:  { type: integer }
                quantity:   { type: integer, minimum: 1, default: 1 }
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cartCount: { type: integer }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

    put:
      tags: [Cart]
      summary: Update item quantity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                item_type:  { type: string, enum: [product, bundle], default: product }
                product_id: { type: integer }
                bundle_id:  { type: integer }
                quantity:   { type: integer, minimum: 0 }
      responses:
        "200":
          description: Quantity updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          subtotal:  { type: number, format: float }
                          cartCount: { type: integer }

  /api/cart/items/{itemId}:
    parameters:
      - name: itemId
        in: path
        required: true
        schema: { type: integer }
      - name: item_type
        in: query
        schema: { type: string, enum: [product, bundle], default: product }

    delete:
      tags: [Cart]
      summary: Remove item from cart
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          subtotal:  { type: number, format: float }
                          cartCount: { type: integer }

  /api/cart/checkout:
    get:
      tags: [Cart]
      summary: Get checkout summary (items + addresses)
      responses:
        "200":
          description: Checkout data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/CartItem' }
                          subtotal:  { type: number, format: float }
                          count:     { type: integer }
                          addresses:
                            type: array
                            items: { $ref: '#/components/schemas/Address' }
        "422": { description: Cart is empty }

  /api/cart/apply-discount:
    post:
      tags: [Cart]
      summary: Validate and apply a discount code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [discount_code, subtotal]
              properties:
                discount_code: { type: string }
                subtotal:      { type: number, format: float }
      responses:
        "200":
          description: Discount applied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          discount_amount: { type: number, format: float }
                          total:           { type: number, format: float }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/cart/place-order:
    post:
      tags: [Cart]
      summary: Place order from current cart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address_id:    { type: integer }
                discount_code: { type: string }
      responses:
        "201": { description: Order placed }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

