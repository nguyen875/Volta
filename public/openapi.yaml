openapi: 3.0.3
info:
  title: Volta API
  version: 1.0.0
  description: |
    REST API for the Volta e-commerce platform.

    **Authentication:** Session-based (PHP session cookie).
    - Call `POST /api/login` to obtain a session.
    - Protected endpoints require either **Admin** or **Login** role as noted.

servers:
  - url: /volta/public
    description: Local XAMPP (default)

tags:
  - name: Auth
    description: Login, signup, logout, current user
  - name: Users
    description: Admin – user management
  - name: Products
    description: Admin – product management
  - name: Product Images
    description: Admin – product image management
  - name: Product Relations
    description: Admin – related product management
  - name: Categories
    description: Category management
  - name: Discounts
    description: Admin – discount / coupon management
  - name: Admin Orders
    description: Admin – order management
  - name: Bundles
    description: Admin – bundle management
  - name: Shop
    description: Public storefront endpoints
  - name: Cart
    description: Authenticated customer cart
  - name: My Orders
    description: Authenticated customer order history
  - name: Profile
    description: Authenticated customer profile & addresses

# ─────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────
components:
  # ── Schemas ────────────────────────────────────────────────
  schemas:
    # API wrapper shapes
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "OK" }
        data: {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Something went wrong." }

    PaginatedMeta:
      type: object
      properties:
        page:  { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 100 }

    # Domain schemas
    User:
      type: object
      properties:
        id:        { type: integer }
        email:     { type: string, format: email }
        full_name: { type: string }
        phone:     { type: string }
        role:      { type: string, enum: [admin, customer] }
        created_at: { type: string, format: date-time }

    Product:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        slug:        { type: string }
        category_id: { type: integer }
        description: { type: string }
        price:       { type: number, format: float }
        stock:       { type: integer }
        badge:       { type: string }
        is_active:   { type: boolean }
        created_at:  { type: string, format: date-time }

    ShopProduct:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            image_url: { type: string, nullable: true }

    ShopProductDetail:
      type: object
      properties:
        product: { $ref: '#/components/schemas/ShopProduct' }
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImage' }

    ProductImage:
      type: object
      properties:
        id:         { type: integer }
        product_id: { type: integer }
        url:        { type: string }
        is_primary: { type: boolean }

    ProductRelation:
      type: object
      properties:
        id:                 { type: integer }
        product_id:         { type: integer }
        related_product_id: { type: integer }

    Category:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        slug:        { type: string }
        description: { type: string }
        created_at:  { type: string, format: date-time }

    Discount:
      type: object
      properties:
        id:             { type: integer }
        code:           { type: string }
        type:           { type: string, enum: [percentage, fixed] }
        value:          { type: number, format: float }
        min_order:      { type: number, format: float }
        max_uses:       { type: integer }
        used_count:     { type: integer }
        expires_at:     { type: string, format: date-time, nullable: true }
        is_active:      { type: boolean }

    Order:
      type: object
      properties:
        id:          { type: integer }
        user_id:     { type: integer }
        address_id:  { type: integer, nullable: true }
        status:      { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
        total_price: { type: number, format: float }
        created_at:  { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        id:          { type: integer }
        order_id:    { type: integer }
        product_id:  { type: integer }
        quantity:    { type: integer }
        unit_price:  { type: number, format: float }

    AdminRevenueDay:
      type: object
      properties:
        date: { type: string, format: date, example: "2026-04-18" }
        day_of_week: { type: string, example: "Sat" }
        amount: { type: number, format: float, example: 1299.0 }

    AdminRecentOrder:
      type: object
      properties:
        order_id: { type: integer, example: 1201 }
        customer: { type: string, example: "Alice Nguyen" }
        total: { type: number, format: float, example: 349.0 }
        status: { type: string, enum: [pending, paid, shipped, delivered, cancelled] }
        date: { type: string, format: date-time }

    AdminTopProduct:
      type: object
      properties:
        product_id: { type: integer, example: 14 }
        product: { type: string, example: "KeyFlow 75%" }
        price: { type: number, format: float, example: 189.0 }
        stock: { type: integer, example: 55 }
        sold_quantity: { type: integer, example: 123 }

    AdminEffectiveFilter:
      type: object
      properties:
        mode: { type: string, enum: [date_range, last_n_days] }
        start_date: { type: string, format: date-time, example: "2026-04-12 00:00:00" }
        end_date: { type: string, format: date-time, example: "2026-04-18 23:59:59" }
        days: { type: integer, example: 7 }

    AdminOrderStats:
      type: object
      properties:
        total_orders: { type: integer, example: 42 }
        total_revenue: { type: number, format: float, example: 12026.0 }
        completed_orders: { type: integer, example: 19 }
        cancelled_orders: { type: integer, example: 2 }
        effective_filter:
          $ref: '#/components/schemas/AdminEffectiveFilter'
        revenue_window_days: { type: integer, example: 7 }
        revenue_by_day:
          type: array
          items: { $ref: '#/components/schemas/AdminRevenueDay' }
        revenue_last_7_days:
          description: Backward-compatible alias of revenue_by_day.
          type: array
          items: { $ref: '#/components/schemas/AdminRevenueDay' }
        recent_orders:
          type: array
          items: { $ref: '#/components/schemas/AdminRecentOrder' }
        top_products:
          type: array
          items: { $ref: '#/components/schemas/AdminTopProduct' }

    Bundle:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string }
        bundle_price: { type: number, format: float }
        total_product_price: { type: number, format: float, example: 857.0 }
        off_percentage: { type: number, format: float, example: 24.27 }
        is_active:   { type: boolean }

    BundleItemProduct:
      type: object
      properties:
        id:        { type: integer }
        name:      { type: string }
        slug:      { type: string }
        price:     { type: number, format: float, nullable: true }
        image_url: { type: string, nullable: true }

    BundleItem:
      type: object
      properties:
        id:         { type: integer }
        bundle_id:  { type: integer }
        product_id: { type: integer }
        product:
          allOf:
            - $ref: '#/components/schemas/BundleItemProduct'
          nullable: true

    BundleDetail:
      type: object
      properties:
        bundle: { $ref: '#/components/schemas/Bundle' }
        items:
          type: array
          items: { $ref: '#/components/schemas/BundleItem' }

    CartItem:
      type: object
      properties:
        id:            { type: integer }
        item_type:     { type: string, enum: [product, bundle] }
        item_id:       { type: integer }
        product_id:    { type: integer }
        bundle_id:     { type: integer, nullable: true }
        quantity:      { type: integer }
        product_name:  { type: string }
        product_slug:  { type: string }
        product_price: { type: number, format: float }
        product_stock: { type: integer }
        bundle_name:   { type: string, nullable: true }
        bundle_price:  { type: number, format: float, nullable: true }
        image_url:     { type: string, nullable: true }
        line_total:    { type: number, format: float }

    Address:
      type: object
      properties:
        id:         { type: integer }
        user_id:    { type: integer }
        label:      { type: string }
        street:     { type: string }
        city:       { type: string }
        country:    { type: string }
        is_default: { type: boolean }

  # ── Common parameters ──────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20 }
    SearchParam:
      name: search
      in: query
      schema: { type: string }

  # ── Responses ──────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════════

  /api/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email, example: admin@volta.com }
                password: { type: string, example: secret }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/signup:
    post:
      tags: [Auth]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, confirm_password]
              properties:
                email:            { type: string, format: email }
                password:         { type: string }
                confirm_password: { type: string }
                full_name:        { type: string }
                phone:            { type: string }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        "409": { description: Email already in use }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        "200": { description: Logged out }

  /api/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  # ══════════════════════════════════════════════════════════
  # USERS  (Admin)
  # ══════════════════════════════════════════════════════════

  /api/users:
    get:
      tags: [Users]
      summary: List users (Admin)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
                      meta: { $ref: '#/components/schemas/PaginatedMeta' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

    post:
      tags: [Users]
      summary: Create user (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:     { type: string, format: email }
                password:  { type: string }
                full_name: { type: string }
                phone:     { type: string }
                role:      { type: string, enum: [admin, customer] }
      responses:
        "201": { description: User created }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Users]
      summary: Get user by ID (Admin)
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/User' }
        "404": { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Users]
      summary: Update user (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:     { type: string, format: email }
                full_name: { type: string }
                phone:     { type: string }
                role:      { type: string, enum: [admin, customer] }
      responses:
        "200": { description: User updated }
        "404": { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Users]
      summary: Delete user (Admin)
      responses:
        "200": { description: User deleted }
        "404": { $ref: '#/components/responses/NotFound' }

  # ══════════════════════════════════════════════════════════
  # PRODUCTS  (Admin)
  # ══════════════════════════════════════════════════════════

  /api/products:
    get:
      tags: [Products]
      summary: List products (Admin)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }
                      meta: { $ref: '#/components/schemas/PaginatedMeta' }

    post:
      tags: [Products]
      summary: Create product (Admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, category_id, price, stock]
              properties:
                name:        { type: string }
                slug:        { type: string }
                category_id: { type: integer }
                description: { type: string }
                price:       { type: number, format: float }
                stock:       { type: integer }
                badge:       { type: string }
                is_active:   { type: boolean }
                image:       { type: string, format: binary }
      responses:
        "201": { description: Product created }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Products]
      summary: Get product by ID (Admin)
      responses:
        "200":
          description: Product detail with images
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          product: { $ref: '#/components/schemas/Product' }
                          images:
                            type: array
                            items: { $ref: '#/components/schemas/ProductImage' }
        "404": { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Products]
      summary: Update product (Admin)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:        { type: string }
                slug:        { type: string }
                category_id: { type: integer }
                description: { type: string }
                price:       { type: number, format: float }
                stock:       { type: integer }
                badge:       { type: string }
                is_active:   { type: boolean }
                image:       { type: string, format: binary }
      responses:
        "200": { description: Product updated }
        "404": { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Products]
      summary: Delete product (Admin)
      responses:
        "200": { description: Product deleted }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Product Images ────────────────────────────────────────

  /api/products/{id}/images:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Product Images]
      summary: List images for a product (Admin)
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ProductImage' }

    post:
      tags: [Product Images]
      summary: Upload product image (Admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image: { type: string, format: binary }
      responses:
        "201": { description: Image uploaded }

  /api/products/{id}/images/{imageId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: imageId
        in: path
        required: true
        schema: { type: integer }

    delete:
      tags: [Product Images]
      summary: Delete product image (Admin)
      responses:
        "200": { description: Image deleted }
        "404": { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/images/{imageId}/primary:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: imageId
        in: path
        required: true
        schema: { type: integer }

    put:
      tags: [Product Images]
      summary: Set image as primary (Admin)
      responses:
        "200": { description: Primary image updated }

  # ── Product Relations ─────────────────────────────────────

  /api/products/{id}/relations:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Product Relations]
      summary: List related products (Admin)
      responses:
        "200":
          description: Related product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }

    post:
      tags: [Product Relations]
      summary: Add product relation (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [related_id]
              properties:
                related_id: { type: integer }
                type: { type: string, enum: [upsell, crosssell], default: crosssell }
                discount_amount: { type: number, format: float, default: 0 }
                sort_order: { type: integer, default: 0 }
      responses:
        "201": { description: Relation added }

  /api/products/{id}/relations/{relId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
      - name: relId
        in: path
        required: true
        schema: { type: integer }

    delete:
      tags: [Product Relations]
      summary: Remove product relation (Admin)
      responses:
        "200": { description: Relation removed }

  # ══════════════════════════════════════════════════════════
  # CATEGORIES
  # ══════════════════════════════════════════════════════════

  /api/categories:
    get:
      tags: [Categories]
      summary: List all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Category' }

    post:
      tags: [Categories]
      summary: Create category (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                slug:        { type: string }
                description: { type: string }
      responses:
        "201": { description: Category created }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

  /api/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Categories]
      summary: Get category by ID
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Category' }
        "404": { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Categories]
      summary: Update category (Admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                slug:        { type: string }
                description: { type: string }
      responses:
        "200": { description: Category updated }

    delete:
      tags: [Categories]
      summary: Delete category (Admin)
      responses:
        "200": { description: Category deleted }

  # ══════════════════════════════════════════════════════════
  # DISCOUNTS  (Admin)
  # ══════════════════════════════════════════════════════════

  /api/discounts:
    get:
      tags: [Discounts]
      summary: List all discounts (Admin)
      responses:
        "200":
          description: Discount list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Discount' }

    post:
      tags: [Discounts]
      summary: Create discount (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, type, value]
              properties:
                code:       { type: string }
                type:       { type: string, enum: [percentage, fixed] }
                value:      { type: number, format: float }
                min_order:  { type: number, format: float }
                max_uses:   { type: integer }
                expires_at: { type: string, format: date-time }
                is_active:  { type: boolean }
      responses:
        "201": { description: Discount created }

  /api/discounts/valid:
    get:
      tags: [Discounts]
      summary: List currently valid (active & non-expired) discounts (Admin)
      responses:
        "200":
          description: Valid discount list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Discount' }

  /api/discounts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Discounts]
      summary: Get discount by ID (Admin)
      responses:
        "200":
          description: Discount detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Discount' }
        "404": { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Discounts]
      summary: Update discount (Admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:       { type: string }
                type:       { type: string, enum: [percentage, fixed] }
                value:      { type: number, format: float }
                min_order:  { type: number, format: float }
                max_uses:   { type: integer }
                expires_at: { type: string, format: date-time }
                is_active:  { type: boolean }
      responses:
        "200": { description: Discount updated }

    delete:
      tags: [Discounts]
      summary: Delete discount (Admin)
      responses:
        "200": { description: Discount deleted }

  # ══════════════════════════════════════════════════════════
  # ADMIN ORDERS
  # ══════════════════════════════════════════════════════════

  /api/admin/orders:
    get:
      tags: [Admin Orders]
      summary: List orders (Admin)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema: { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Order' }
                      meta: { $ref: '#/components/schemas/PaginatedMeta' }

    post:
      tags: [Admin Orders]
      summary: Create order (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, total_price, items]
              properties:
                user_id:     { type: integer }
                address_id:  { type: integer }
                status:      { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
                total_price: { type: number, format: float }
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, quantity, unit_price]
                    properties:
                      product_id: { type: integer }
                      quantity:   { type: integer }
                      unit_price: { type: number, format: float }
      responses:
        "201": { description: Order created }

  /api/admin/orders/stats:
    get:
      tags: [Admin Orders]
      summary: Order statistics (Admin)
      parameters:
        - name: start_date
          in: query
          required: false
          description: Optional inclusive lower bound. Use together with end_date to activate date_range mode.
          schema: { type: string }
        - name: end_date
          in: query
          required: false
          description: Optional inclusive upper bound. Use together with start_date to activate date_range mode.
          schema: { type: string }
        - name: days
          in: query
          required: false
          description: Revenue chart window size (1-60), default 7. Ignored when both start_date and end_date are provided.
          schema: { type: integer, minimum: 1, maximum: 60, default: 7 }
        - name: recent_limit
          in: query
          required: false
          description: Number of recent orders to return (1-50), default 10
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
        - name: top_limit
          in: query
          required: false
          description: Number of top products to return (1-50), default 10
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        "200":
          description: Aggregated order stats with dashboard widgets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminOrderStats'

  /api/admin/orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Admin Orders]
      summary: Get order with items (Admin)
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order: { $ref: '#/components/schemas/Order' }
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/OrderItem' }
        "404": { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Admin Orders]
      summary: Update order (Admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:      { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
                address_id:  { type: integer }
                total_price: { type: number, format: float }
      responses:
        "200": { description: Order updated }

    delete:
      tags: [Admin Orders]
      summary: Delete order (Admin)
      responses:
        "200": { description: Order deleted }

  /api/admin/orders/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    put:
      tags: [Admin Orders]
      summary: Update order status only (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
      responses:
        "200": { description: Status updated }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }

