        "200": { description: Bundle deleted }

  /api/bundles/{id}/items:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }

    get:
      tags: [Bundles]
      summary: List items in a bundle
      responses:
        "200":
          description: Bundle items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/BundleItem' }

    post:
      tags: [Bundles]
      summary: Add item to bundle (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: integer }
